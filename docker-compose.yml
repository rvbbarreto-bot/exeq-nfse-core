services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: exeq
      POSTGRES_PASSWORD: exeq_dev
      POSTGRES_DB: exeq_nfse
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exeq -d exeq_nfse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
